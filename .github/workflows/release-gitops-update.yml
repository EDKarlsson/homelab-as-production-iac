name: Release - GitOps Manifest Update

on:
  workflow_dispatch:
    inputs:
      manifest_file:
        description: "Manifest file to update (e.g., kubernetes/apps/n8n/deployment.yaml)"
        required: true
        type: string
      image_reference:
        description: "Target image reference (e.g., n8nio/n8n:2.8.3 or ghcr.io/org/app:v1.2.3)"
        required: true
        type: string
      container_name:
        description: "Optional container name (for multi-container workloads)"
        required: false
        type: string
      run_validation:
        description: "Run scripts/k8s/validate.sh before opening PR"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-gitops-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update_manifest:
    name: Update Manifest and Open PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate input path
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.manifest_file }}" != kubernetes/* ]]; then
            echo "ERROR: manifest_file must be under kubernetes/"
            exit 1
          fi
          if [[ ! -f "${{ inputs.manifest_file }}" ]]; then
            echo "ERROR: file not found: ${{ inputs.manifest_file }}"
            exit 1
          fi

      - name: Install yq
        shell: bash
        run: |
          set -euo pipefail
          YQ_VERSION=v4.44.5
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Update manifest image
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.container_name }}" ]]; then
            bash scripts/ci/gitops-image-update.sh "${{ inputs.manifest_file }}" "${{ inputs.image_reference }}" "${{ inputs.container_name }}"
          else
            bash scripts/ci/gitops-image-update.sh "${{ inputs.manifest_file }}" "${{ inputs.image_reference }}"
          fi

      - name: Setup kustomize
        if: ${{ inputs.run_validation }}
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.2"

      - name: Install kubeconform
        if: ${{ inputs.run_validation }}
        shell: bash
        run: |
          set -euo pipefail
          KUBECONFORM_VERSION=v0.6.7
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" -o /tmp/kubeconform.tgz
          tar -xzf /tmp/kubeconform.tgz -C /tmp kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
          sudo chmod +x /usr/local/bin/kubeconform

      - name: Validate Flux/K8s manifests
        if: ${{ inputs.run_validation }}
        run: bash scripts/k8s/validate.sh

      - name: Build PR metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          file_slug="$(echo "${{ inputs.manifest_file }}" | tr '/.' '-')"
          branch_name="chore/release-${file_slug}-${short_sha}"
          title="chore(release): update ${file_slug} image to ${{ inputs.image_reference }}"
          {
            echo "branch_name=${branch_name}"
            echo "title=${title}"
          } >> "${GITHUB_OUTPUT}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.meta.outputs.branch_name }}
          commit-message: ${{ steps.meta.outputs.title }}
          title: ${{ steps.meta.outputs.title }}
          body: |
            ## Release Manifest Update

            - Manifest: `${{ inputs.manifest_file }}`
            - New image: `${{ inputs.image_reference }}`
            - Container (optional): `${{ inputs.container_name }}`
            - Validation run: `${{ inputs.run_validation }}`

            This PR was generated by the `Release - GitOps Manifest Update` workflow.
          labels: |
            release
            gitops
          base: main
          delete-branch: true
