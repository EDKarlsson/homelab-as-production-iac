---
# K3s Server (Control Plane) Provisioning
# Installs K3s server on all control plane nodes.
#
# Usage:
#   export SSH_AUTH_SOCK=~/.1password/agent.sock
#   ansible-playbook -i inventory/k3s.yml playbooks/k3s-servers.yml
#
# For fresh deployments only — existing nodes should use k3s-upgrade.yml.

- name: Provision K3s server nodes
  hosts: k3s_servers
  become: true
  tasks:
    - name: Disable swap
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '\sswap\s'
        state: absent

    - name: Load kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - br_netfilter
        - ip_vs
        - ip_vs_rr
        - ip_vs_wrr
        - ip_vs_sh
        - nf_conntrack

    - name: Persist kernel modules across reboots
      ansible.builtin.copy:
        content: |
          br_netfilter
          ip_vs
          ip_vs_rr
          ip_vs_wrr
          ip_vs_sh
          nf_conntrack
        dest: /etc/modules-load.d/k3s.conf
        mode: "0644"

    - name: Configure sysctl for Kubernetes networking
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k3s.conf
        reload: true
      loop:
        - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { key: "net.bridge.bridge-nf-call-iptables", value: "1" }
        - { key: "net.ipv4.ip_forward", value: "1" }

    - name: Create K3s config directory
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"

    - name: Template K3s server config
      ansible.builtin.template:
        src: "{{ playbook_dir | dirname }}/templates/k3s-server-config.yaml.j2"
        dest: /etc/rancher/k3s/config.yaml
        mode: "0600"

    - name: Download K3s installer
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: "0755"

    - name: Install K3s server
      ansible.builtin.shell: |
        INSTALL_K3S_VERSION={{ k3s_version }} /tmp/k3s-install.sh server
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s service to be active
      ansible.builtin.systemd:
        name: k3s
        state: started
        enabled: true
      register: k3s_service
      until: k3s_service is not failed
      retries: 12
      delay: 10

    - name: Wait for node to be Ready
      ansible.builtin.command: k3s kubectl get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: node_ready
      until: node_ready.stdout == "True"
      retries: 30
      delay: 10
      changed_when: false

    - name: Set up kubeconfig for k3sadmin user
      block:
        - name: Create .kube directory
          ansible.builtin.file:
            path: /home/{{ ansible_user }}/.kube
            state: directory
            owner: "{{ ansible_user }}"
            group: "{{ ansible_user }}"
            mode: "0700"

        - name: Copy kubeconfig
          ansible.builtin.copy:
            src: /etc/rancher/k3s/k3s.yaml
            dest: /home/{{ ansible_user }}/.kube/config
            remote_src: true
            owner: "{{ ansible_user }}"
            group: "{{ ansible_user }}"
            mode: "0600"

- name: Verify K3s server cluster
  hosts: k3s_servers[0]
  become: true
  tasks:
    - name: Show cluster nodes
      ansible.builtin.command: k3s kubectl get nodes -o wide
      register: cluster_nodes
      changed_when: false

    - name: Display cluster status
      ansible.builtin.debug:
        msg: "{{ cluster_nodes.stdout_lines }}"
