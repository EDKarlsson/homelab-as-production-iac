# ExternalSecret — Homepage widget credentials
#
# 1Password item: "homepage-widgets" in Homelab vault
# All fields must be custom text fields.
#
# Required fields (create API tokens from each app's UI):
#   - grafana-password:        Grafana admin password
#   - plex-token:              Plex → Settings → Account → Copy token
#   - portainer-api-key:       Portainer → My Account → Access tokens
#   - gitlab-token:            GitLab → User Settings → Access Tokens (read_api)
#   - linkwarden-token:        Linkwarden → Settings → API Keys
#   - calibre-password:        Calibre-web password (default: admin123)
#   - tailscale-api-key:       Tailscale Admin → Settings → Keys → API Key
#   - proxmox-url:             https://<pve-node-lan-ip>:8006
#   - proxmox-token-id:        user@pam!tokenname
#   - proxmox-token-secret:    API token secret value
#   - diskstation-username:    Synology DSM admin user (from "Synology: Remote Stat")
#   - diskstation-password:    Synology DSM password (2FA must be disabled for this user)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-widget-secrets
  namespace: homepage
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: homepage-widget-secrets
    creationPolicy: Owner
  data:
    - secretKey: grafana-password
      remoteRef:
        key: homepage-widgets
        property: grafana-password
    - secretKey: plex-token
      remoteRef:
        key: homepage-widgets
        property: plex-token
      remoteRef:
        key: homepage-widgets
    - secretKey: portainer-api-key
      remoteRef:
        key: homepage-widgets
        property: portainer-api-key
    - secretKey: gitlab-token
      remoteRef:
        key: homepage-widgets
        property: gitlab-token
    - secretKey: linkwarden-token
      remoteRef:
        key: homepage-widgets
        property: linkwarden-token
    - secretKey: calibre-password
      remoteRef:
        key: homepage-widgets
        property: calibre-password
    - secretKey: tailscale-api-key
      remoteRef:
        key: homepage-widgets
        property: tailscale-api-key
    - secretKey: proxmox-url
      remoteRef:
        key: homepage-widgets
        property: proxmox-url
    - secretKey: proxmox-token-id
      remoteRef:
        key: homepage-widgets
        property: proxmox-token-id
    - secretKey: proxmox-token-secret
      remoteRef:
        key: homepage-widgets
        property: proxmox-token-secret
    - secretKey: diskstation-username
      remoteRef:
        key: homepage-widgets
        property: diskstation-username
    - secretKey: diskstation-password
      remoteRef:
        key: homepage-widgets
        property: diskstation-password
