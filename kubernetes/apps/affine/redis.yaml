---
# Redis — required by AFFiNE for job queues (BullMQ) and session cache.
# Standalone single-instance, no cluster mode needed at homelab scale.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: affine-redis
  namespace: affine
  labels:
    app.kubernetes.io/name: affine-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: affine-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: affine-redis
    spec:
      containers:
        - name: redis
          image: docker.io/library/redis:7.4.2
          args: ["--appendonly", "yes", "--maxmemory-policy", "noeviction"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: affine-redis
  namespace: affine
spec:
  selector:
    app.kubernetes.io/name: affine-redis
  ports:
    - port: 6379
      targetPort: 6379
