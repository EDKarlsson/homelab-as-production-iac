---
# ExternalSecret — syncs AFFiNE credentials from 1Password.
#
# 1Password items:
#   "affine-db"          (Homelab vault) — username, password fields
#   "affine-private-key" (Homelab vault) — private-key field (RSA 2048, JWT signing)
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: affine-secrets
  namespace: affine
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: affine-secrets
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: affine-db
        property: password
    - secretKey: private-key
      remoteRef:
        key: affine-private-key
        property: private-key
