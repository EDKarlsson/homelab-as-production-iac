# ExternalSecret: pulls GitLab Runner auth token from 1Password.
# 1Password item: "gitlab-runner" (Homelab vault), field: token (STRING)
# Token was created via GitLab API POST /api/v4/user/runners (GitLab 16+ new registration flow).
#
# The chart's projected-secrets volume requires BOTH keys:
#   runner-token              — new auth token (glrt-... prefix)
#   runner-registration-token — legacy key; empty string satisfies the chart
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-runner-token
  namespace: gitlab-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: gitlab-runner-token
    creationPolicy: Owner
    template:
      data:
        runner-token: "{{ .runnerToken }}"
        runner-registration-token: ""
  data:
    - secretKey: runnerToken
      remoteRef:
        key: gitlab-runner
        property: token
