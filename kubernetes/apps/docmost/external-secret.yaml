# ExternalSecret: pulls Docmost secrets from 1Password
# Prerequisites:
#   1. Create "docmost" database on PG VM: sudo -u postgres createdb -O docmost docmost
#   2. Create PG user: sudo -u postgres createuser docmost
#   3. Set password: sudo -u postgres psql -c "ALTER USER docmost PASSWORD '<password>';"
#   4. Add pg_hba entry for docmost user
#   5. Create 1Password item "docmost" in Homelab vault with fields:
#      - app-secret: generated via `openssl rand -hex 32`
#      - database-url: postgresql://docmost:<password>@10.0.0.44:5432/docmost
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docmost-secrets
  namespace: docmost
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: docmost-secrets
    creationPolicy: Owner
  data:
    - secretKey: app-secret
      remoteRef:
        key: docmost
        property: app-secret
    - secretKey: database-url
      remoteRef:
        key: docmost
        property: database-url
