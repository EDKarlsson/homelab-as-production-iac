# ExternalSecret: pulls Dependency-Track DB password from 1Password
#
# Prerequisites (run once on PG primary 10.0.0.45):
#   sudo -u postgres createuser dependencytrack
#   sudo -u postgres createdb -O dependencytrack dependencytrack
#   sudo -u postgres psql -c "ALTER USER dependencytrack PASSWORD '<password>';"
#   sudo -u postgres psql -d dependencytrack -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
#   # Add to /etc/postgresql/*/main/pg_hba.conf on BOTH primary and standby:
#   host  dependencytrack  dependencytrack  10.0.0.0/24  scram-sha-256
#
# 1Password item "dependency-track" in Homelab vault:
#   - db-password: the PostgreSQL password for the dependencytrack user
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dependency-track-secrets
  namespace: dependency-track
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: dependency-track-secrets
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: dependency-track
        property: db-password
