# ExternalSecret — Keycloak OIDC credentials for GitLab SSO
#
# 1Password item: "gitlab-keycloak-oidc" in Homelab vault
# Required custom text fields:
#   - client-id:      gitlab  (or whatever client ID you set in Keycloak)
#   - client-secret:  <client secret from Keycloak admin console>
#
# Keycloak setup (one-time, via admin console at keycloak.homelab.ts.net):
#   1. Clients → Create client
#      - Client ID:      gitlab
#      - Client type:    OpenID Connect
#      - Authentication: ON (confidential)
#   2. Settings tab:
#      - Valid redirect URIs: https://gitlab.homelab.ts.net/users/auth/openid_connect/callback
#      - Web origins: https://gitlab.homelab.ts.net
#   3. Credentials tab → copy Client secret
#   4. Store in 1Password item "gitlab-keycloak-oidc":
#      - client-id:     gitlab
#      - client-secret: <copied secret>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-keycloak-oidc
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: gitlab-keycloak-oidc
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: gitlab-keycloak-oidc
        property: client-id
    - secretKey: client-secret
      remoteRef:
        key: gitlab-keycloak-oidc
        property: client-secret
