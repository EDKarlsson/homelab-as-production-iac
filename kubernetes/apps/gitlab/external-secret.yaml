# ExternalSecret — Google SMTP credentials for GitLab email notifications
#
# 1Password item: "google-smtp" in Homelab vault
# Required custom text fields in the 1Password item:
#   - host:           smtp.gmail.com
#   - port:           587
#   - smtp-username:  <gmail address>
#   - smtp-password:  <16-char Google App Password, no spaces>
#   - from:           <gmail address>
# Note: 'username' and 'password' are default Login fields (not addressable
# by ESO property). Use smtp-username / smtp-password custom fields instead.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: smtp-credentials
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: smtp-credentials
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: google-smtp
        property: host
    - secretKey: port
      remoteRef:
        key: google-smtp
        property: port
    - secretKey: username
      remoteRef:
        key: google-smtp
        property: smtp-username
    - secretKey: password
      remoteRef:
        key: google-smtp
        property: smtp-password
    - secretKey: from
      remoteRef:
        key: google-smtp
        property: from
