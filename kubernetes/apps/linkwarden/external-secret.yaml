# ExternalSecret — Linkwarden credentials
#
# 1Password item: "linkwarden" in Homelab vault
# Fields (custom text fields):
#   - nextauth-secret: random string (openssl rand -hex 32)
#   - db-password: password for the linkwarden PG user
#   - db-connection-url: postgres://linkwarden:<password>@10.0.0.44:5432/linkwarden
#
# Prerequisites:
#   1. Create PostgreSQL database:
#      sudo -u postgres createuser linkwarden
#      sudo -u postgres createdb -O linkwarden linkwarden
#      sudo -u postgres psql -c "ALTER USER linkwarden PASSWORD '<password>';"
#
#   2. Create 1Password item:
#      op item create --vault Homelab --category login \
#        --title "linkwarden" \
#        'nextauth-secret=<openssl rand -hex 32>' \
#        'db-password=<password>' \
#        'db-connection-url=postgres://linkwarden:<password>@10.0.0.44:5432/linkwarden'
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: linkwarden-secrets
  namespace: linkwarden
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: linkwarden-secrets
    creationPolicy: Owner
  data:
    - secretKey: nextauth-secret
      remoteRef:
        key: linkwarden
        property: nextauth-secret
    - secretKey: db-connection-url
      remoteRef:
        key: linkwarden
        property: db-connection-url
