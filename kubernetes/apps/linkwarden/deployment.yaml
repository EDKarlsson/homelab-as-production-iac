# Linkwarden — bookmark manager
#
# Image: ghcr.io/linkwarden/linkwarden
# Docs: https://docs.linkwarden.app/self-hosting/installation
# GitHub: https://github.com/linkwarden/linkwarden
#
# Uses external PostgreSQL on VIP 10.0.0.44
# Meilisearch not included (basic search works without it, can add later)
#
# Prerequisites:
#   1. PostgreSQL database + user created (see external-secret.yaml)
#   2. 1Password item "linkwarden" with nextauth-secret and db-connection-url
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkwarden
  namespace: linkwarden
  labels:
    app.kubernetes.io/name: linkwarden
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: linkwarden
  template:
    metadata:
      labels:
        app.kubernetes.io/name: linkwarden
    spec:
      containers:
        - name: linkwarden
          image: ghcr.io/linkwarden/linkwarden:v2.13.5
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NEXTAUTH_URL
              value: "https://linkwarden.10.0.0.201.nip.io/api/v1/auth"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: linkwarden-secrets
                  key: nextauth-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: linkwarden-secrets
                  key: db-connection-url
            - name: NEXT_PUBLIC_DISABLE_REGISTRATION
              value: "true"
            # SMTP — used for magic-link login and share notifications
            - name: NEXT_PUBLIC_EMAIL_PROVIDER
              value: smtp
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: from
            - name: EMAIL_SERVER_HOST
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: host
            - name: EMAIL_SERVER_PORT
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: port
            - name: EMAIL_SERVER_USER
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: username
            - name: EMAIL_SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: password
            - name: STORAGE_FOLDER
              value: /data/data
          volumeMounts:
            - name: data
              mountPath: /data/data
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 8Gi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: linkwarden-data
