# ExternalSecret — Google SMTP credentials for Linkwarden account emails
#
# 1Password item: "google-smtp" in Homelab vault
# Required custom text fields (default Login username/password NOT addressable by ESO):
#   - host:           smtp.gmail.com
#   - port:           587
#   - smtp-username:  <gmail address>
#   - smtp-password:  <16-char Google App Password, no spaces>
#   - from:           <gmail address>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: smtp-credentials
  namespace: linkwarden
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: smtp-credentials
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: google-smtp
        property: host
    - secretKey: port
      remoteRef:
        key: google-smtp
        property: port
    - secretKey: username
      remoteRef:
        key: google-smtp
        property: smtp-username
    - secretKey: password
      remoteRef:
        key: google-smtp
        property: smtp-password
    - secretKey: from
      remoteRef:
        key: google-smtp
        property: from
