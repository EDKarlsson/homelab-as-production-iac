# ExternalSecret: pulls code-server password from 1Password
# Prerequisite: Create a 1Password item "code-server" in the Homelab vault
#   with a field named "password"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: code-server-password
  namespace: code-server
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: code-server-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: code-server
        property: password
