# ExternalSecret: pulls JupyterLab token from 1Password
# Prerequisite: Create a 1Password item "jupyterlab" in the Homelab vault
#   with a field named "token" (e.g. generate via: openssl rand -hex 32)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jupyterlab-token
  namespace: jupyterlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: jupyterlab-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: jupyterlab
        property: token
