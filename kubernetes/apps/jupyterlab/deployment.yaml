apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyterlab
  namespace: jupyterlab
  labels:
    app.kubernetes.io/name: jupyterlab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jupyterlab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jupyterlab
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: jupyterlab
          image: quay.io/jupyter/pytorch-notebook:cuda12-2026-02-16
          ports:
            - name: http
              containerPort: 8888
              protocol: TCP
          args:
            - start-notebook.py
            - --ServerApp.allow_origin='*'
          env:
            - name: JUPYTER_ENABLE_LAB
              value: "yes"
            - name: JUPYTER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: jupyterlab-token
                  key: token
            - name: GRANT_SUDO
              value: "yes"
            - name: NB_USER
              value: jovyan
            - name: NB_UID
              value: "1000"
            - name: NB_GID
              value: "1000"
          volumeMounts:
            - name: workspace
              mountPath: /home/jovyan/work
            - name: dshm
              mountPath: /dev/shm
            # TODO: Uncomment when NAS models export is configured
            # - name: models
            #   mountPath: /home/jovyan/models
            #   readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 8Gi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: jupyterlab-workspace
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
        # TODO: Uncomment when NAS models export is configured
        # - name: models
        #   persistentVolumeClaim:
        #     claimName: jupyterlab-models
