# ExternalSecret: pulls Nexus admin credentials from 1Password
# Prerequisites:
#   1. Add custom text fields to existing 1Password item (ESO cannot read default Login fields):
#      env -u OP_CONNECT_HOST -u OP_CONNECT_TOKEN \
#        op item edit YOUR_NEXUS_ITEM_UUID \
#          'admin-username[text]=admin' \
#          'admin-password[text]=<the-actual-password>' \
#          --vault Homelab
#   2. Force-sync after creating fields:
#      kubectl annotate externalsecret nexus-admin-credentials -n nexus \
#        force-sync=$(date +%s) --overwrite
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nexus-admin-credentials
  namespace: nexus
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: nexus-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: nexus-repository
        property: admin-username
    - secretKey: password
      remoteRef:
        key: nexus-repository
        property: admin-password
