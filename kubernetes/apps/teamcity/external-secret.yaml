# ExternalSecret: pulls TeamCity PostgreSQL password from 1Password
# Prerequisites:
#   1. Create PG user: sudo -u postgres createuser teamcity
#   2. Set password: sudo -u postgres psql -c "ALTER USER teamcity PASSWORD '<password>';"
#   3. Create database: sudo -u postgres createdb -O teamcity teamcity
#   4. Add pg_hba entry: host teamcity teamcity 10.42.0.0/16 scram-sha-256
#   5. Reload: sudo systemctl reload postgresql
#   6. Create 1Password item "teamcity" in Homelab vault with field:
#      - db-password: the PostgreSQL password (must be a custom text field)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: teamcity-secrets
  namespace: teamcity
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: teamcity-secrets
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: teamcity
        property: db-password
