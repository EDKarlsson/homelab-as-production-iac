apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coder
  namespace: coder
spec:
  interval: 50m
  install:
    remediation:
      retries: 3
  chart:
    spec:
      chart: coder
      version: "2.x"
      sourceRef:
        kind: HelmRepository
        name: coder-v2
        namespace: coder
      interval: 12h
  values:
    coder:
      env:
        - name: CODER_PG_CONNECTION_URL
          valueFrom:
            secretKeyRef:
              name: coder-secrets
              key: db-connection-url
        - name: CODER_ACCESS_URL
          value: "https://coder.homelab.ts.net"
        - name: CODER_WILDCARD_ACCESS_URL
          value: "*.coder.homelab.ts.net"
      service:
        type: ClusterIP
