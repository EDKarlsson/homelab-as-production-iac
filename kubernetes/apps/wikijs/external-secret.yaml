# ExternalSecret: pulls Wiki.js DB password and Git SSH key from 1Password
# Prerequisites:
#   1. Create "wikijs" database on PG VM: sudo -u postgres createdb -O wikijs wikijs
#   2. Create PG user: sudo -u postgres createuser wikijs
#   3. Set password: sudo -u postgres psql -c "ALTER USER wikijs PASSWORD '<password>';"
#   4. Enable pg_trgm extension: sudo -u postgres psql -d wikijs -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
#   5. Add pg_hba entry for wikijs user
#   6. Generate SSH key: ssh-keygen -t ed25519 -f wikijs-git -C "wikijs@homelab" -N ""
#   7. Add wikijs-git.pub as deploy key on the Git repo (with write access)
#   8. Create 1Password item "wikijs" in Homelab vault with fields:
#      - db-password: the PostgreSQL password
#      - git-ssh-key: contents of wikijs-git private key
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wikijs-secrets
  namespace: wikijs
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: wikijs-secrets
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: wikijs
        property: db-password
    - secretKey: git-ssh-key
      remoteRef:
        key: wikijs
        property: git-ssh-key
