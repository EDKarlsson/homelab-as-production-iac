apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
    spec:
      containers:
        - name: n8n
          image: n8nio/n8n:2.8.3
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          env:
            - name: TZ
              value: America/Los_Angeles
            # Database configuration
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: "10.0.0.44"
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: n8n
            - name: DB_POSTGRESDB_USER
              value: n8n
            # Secrets from ExternalSecret
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: db-password
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: encryption-key
            # SMTP — enables the Send Email node and credential verification emails
            - name: N8N_EMAIL_MODE
              value: smtp
            - name: N8N_SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: host
            - name: N8N_SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: port
            - name: N8N_SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: username
            - name: N8N_SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: password
            - name: N8N_SMTP_SENDER
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: from
            # false = STARTTLS on port 587 (Google SMTP standard).
            # If switching to port 465 (implicit TLS), set this to "true".
            - name: N8N_SMTP_SSL
              value: "false"
            # Prometheus metrics — served at /metrics on the main HTTP port (5678)
            - name: N8N_METRICS
              value: "true"
            - name: N8N_METRICS_INCLUDE_DEFAULT_METRICS
              value: "true"
            - name: N8N_METRICS_INCLUDE_API_ENDPOINTS
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data
