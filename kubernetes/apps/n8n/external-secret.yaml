# ExternalSecret: pulls n8n DB password and encryption key from 1Password
# Prerequisites:
#   1. Create "n8n" database on PG VM: sudo -u postgres createdb n8n
#   2. Create PG user: sudo -u postgres createuser n8n
#   3. Set password: sudo -u postgres psql -c "ALTER USER n8n PASSWORD '<password>';"
#   4. Add pg_hba entry for n8n user
#   5. Create 1Password item "n8n" in Homelab vault with fields:
#      - db-password: the PostgreSQL password
#      - encryption-key: generated via `openssl rand -hex 32`
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-secrets
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: n8n-secrets
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: n8n
        property: db-password
    - secretKey: encryption-key
      remoteRef:
        key: n8n
        property: encryption-key
