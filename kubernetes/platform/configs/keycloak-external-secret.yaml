---
# ExternalSecret — syncs Keycloak admin password from 1Password.
#
# 1Password item: "keycloak-admin" in Homelab vault
# Fields: username, password
#
# Create the 1Password item (one-time):
#   op item create --vault Homelab --category login \
#     --title "keycloak-admin" \
#     username=admin \
#     --generate-password='20,letters,digits,symbols'
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-admin
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: keycloak-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-password
      remoteRef:
        key: keycloak-admin
        property: password
---
# ExternalSecret — syncs Keycloak PostgreSQL credentials from 1Password.
#
# 1Password item: "keycloak-db" in Homelab vault
# Fields: username (keycloak), password
#
# Create the 1Password item (one-time):
#   op item create --vault Homelab --category login \
#     --title "keycloak-db" \
#     username=keycloak \
#     --generate-password='20,letters,digits'
#
# Then provision the database on the PostgreSQL VM (10.0.0.44 VIP):
#   ssh k3sadmin@10.0.0.44
#   sudo -u postgres createdb keycloak
#   sudo -u postgres psql -c "CREATE USER keycloak WITH ENCRYPTED PASSWORD '<password>';"
#   sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE keycloak TO keycloak;"
#   sudo -u postgres psql -d keycloak -c "GRANT ALL ON SCHEMA public TO keycloak;"
#   sudo -u postgres psql -d keycloak -c "GRANT CREATE ON SCHEMA public TO keycloak;"
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-db
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: keycloak-db
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: keycloak-db
        property: password
