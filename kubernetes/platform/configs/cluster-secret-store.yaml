---
# ClusterSecretStore — cluster-wide 1Password Connect provider.
# ExternalSecret resources in any namespace can reference this store
# to sync secrets from 1Password into Kubernetes Secrets.
#
# Prerequisites:
#   1. HA 1Password Connect on Proxmox LXC (keepalived VIP: 10.0.0.72)
#      MASTER: node-01 (CT 200, 10.0.0.70)
#      BACKUP: node-05 (CT 201, 10.0.0.71)
#   2. Bootstrap secret created:
#      ./scripts/k8s/create-eso-connect-secret.sh
#
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword-connect
spec:
  provider:
    onepassword:
      connectHost: http://10.0.0.72:8080
      vaults:
        Homelab: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: onepassword-connect-token
            key: token
            namespace: external-secrets
