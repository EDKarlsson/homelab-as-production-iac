---
# ExternalSecret — syncs Tailscale OAuth credentials from 1Password
# into the K8s Secret that the Tailscale operator HelmRelease references
# via valuesFrom.
#
# 1Password item: "tailscale-k8s-operator" in Homelab vault
# Fields: clientId, clientSecret
#
# Once active, this replaces the manual bootstrap secret created by
# scripts/k8s/create-tailscale-secret.sh
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tailscale-operator-oauth
  namespace: tailscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: tailscale-operator-oauth
    creationPolicy: Owner
  data:
    - secretKey: clientId
      remoteRef:
        key: tailscale-k8s-operator
        property: clientId
    - secretKey: clientSecret
      remoteRef:
        key: tailscale-k8s-operator
        property: clientSecret
