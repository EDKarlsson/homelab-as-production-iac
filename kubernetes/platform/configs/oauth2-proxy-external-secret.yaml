---
# ExternalSecret — syncs OAuth2 Proxy credentials from 1Password.
#
# 1Password item: "oauth2-proxy" in Homelab vault
# Fields: client-id, client-secret, cookie-secret
#
# Create the 1Password item (one-time):
#   openssl rand -base64 32  # generate cookie secret
#   op item create --vault Homelab --category login \
#     --title "oauth2-proxy" \
#     'client-id=oauth2-proxy' \
#     'client-secret=<from-keycloak-credentials-tab>' \
#     'cookie-secret=<from-openssl>'
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: oauth2-proxy
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: oauth2-proxy
        property: client-id
    - secretKey: client-secret
      remoteRef:
        key: oauth2-proxy
        property: client-secret
    - secretKey: cookie-secret
      remoteRef:
        key: oauth2-proxy
        property: cookie-secret
