---
# Tailscale Ingress for Prometheus — remote access with auto *.ts.net TLS
# Accessible at https://prometheus.<tailnet>.ts.net from any Tailscale device
# Used by Prometheus MCP server for AI-assisted metric queries
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-tailscale
  namespace: monitoring
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: kube-prometheus-stack-prometheus
      port:
        number: 9090
  tls:
    - hosts:
        - prometheus
