---
# Tailscale Ingress for Grafana — remote access with auto *.ts.net TLS
# Accessible at https://grafana.<tailnet>.ts.net from any Tailscale device
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-tailscale
  namespace: monitoring
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: kube-prometheus-stack-grafana
      port:
        number: 80
  tls:
    - hosts:
        - grafana
