# ExternalSecret — syncs Slack webhook URL for Flux notification-controller
#
# Reuses the same 1Password item as Alertmanager: "alertmanager-slack"
# Maps the "webhook-url" field to "address" (key expected by Flux Provider)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flux-slack-webhook
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: flux-slack-webhook
    creationPolicy: Owner
  data:
    - secretKey: address
      remoteRef:
        key: alertmanager-slack
        property: webhook-url
