---
# ExternalSecret — syncs Grafana admin password from 1Password.
# The kube-prometheus-stack HelmRelease references this Secret
# via valuesFrom (optional: true for first-deploy tolerance).
#
# 1Password item: "grafana-admin" in Homelab vault
# Field: password
#
# Create the 1Password item (one-time):
#   op item create --vault Homelab --category login \
#     --title "grafana-admin" \
#     username=admin \
#     --generate-password='20,letters,digits,symbols'
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-password
      remoteRef:
        key: grafana-admin
        property: password
