---
# ExternalSecret — syncs Grafana OIDC client credentials from 1Password.
# The HelmRelease injects these as env vars via envFromSecret.
# Because keys use the GF_AUTH_GENERIC_OAUTH_ prefix, Grafana reads them
# automatically without any grafana.ini mapping needed.
#
# 1Password item: "grafana-keycloak-oidc" in Homelab vault
# Fields: GF_AUTH_GENERIC_OAUTH_CLIENT_ID, GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
#
# Create the 1Password item (one-time):
#   op item create --vault Homelab --category login \
#     --title "grafana-keycloak-oidc" \
#     'GF_AUTH_GENERIC_OAUTH_CLIENT_ID=grafana' \
#     'GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=<secret-from-keycloak>'
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-keycloak-oidc
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: grafana-keycloak-oidc
    creationPolicy: Owner
  data:
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
      remoteRef:
        key: grafana-keycloak-oidc
        property: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      remoteRef:
        key: grafana-keycloak-oidc
        property: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
