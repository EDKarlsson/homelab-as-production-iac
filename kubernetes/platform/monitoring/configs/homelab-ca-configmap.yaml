# Homelab self-signed CA certificate — public, not sensitive.
# Used by Grafana to trust TLS connections to keycloak.homelab.ts.net
# (which resolves via CoreDNS override to 10.0.0.201, served by nginx
# with a homelab-CA-signed cert).
#
# Mirrors the same ConfigMap in oauth2-proxy namespace. ConfigMaps are
# namespace-scoped, so each consumer namespace needs its own copy.
#
# The cert is managed by cert-manager (secret: cert-manager/homelab-ca).
# This ConfigMap is a read-only copy; rotate only if CA is regenerated.
apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-ca-cert
  namespace: monitoring
data:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    MIIBajCCARCgAwIBAgIQcrAwy52SWx3fOtuTSaMdsDAKBggqhkjOPQQDAjAVMRMw
