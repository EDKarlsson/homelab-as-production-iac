apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pve-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: pve-exporter
    app.kubernetes.io/component: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: pve-exporter
  endpoints:
    - port: metrics
      path: /pve
      interval: 60s
      scrapeTimeout: 30s
      params:
        target:
          - pve-cluster.monitoring.svc.cluster.local  # stable in-cluster DNS, see pve-cluster-endpoints.yaml
        module:
          - default
