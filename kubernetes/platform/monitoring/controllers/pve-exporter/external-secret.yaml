# ExternalSecret — templates PVE API credentials into pve.yml config
# Used by the pve-exporter Deployment
#
# 1Password item: "pve-exporter" in Homelab vault
# Fields: user, token-name, token-value
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pve-exporter-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: pve-exporter-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        pve.yml: |
          default:
            user: "{{ .user }}"
            token_name: "{{ .token_name }}"
            token_value: "{{ .token_value }}"
            verify_ssl: false
  data:
    - secretKey: user
      remoteRef:
        key: pve-exporter
        property: user
    - secretKey: token_name
      remoteRef:
        key: pve-exporter
        property: token-name
    - secretKey: token_value
      remoteRef:
        key: pve-exporter
        property: token-value
