# Headless Service + Endpoints for the Proxmox VE cluster API.
# Using a Service/Endpoints abstraction rather than a raw IP in the ServiceMonitor:
#   - provides a stable in-cluster DNS name (pve-cluster.monitoring.svc.cluster.local)
#   - makes IP changes a single-file update
#   - node-02 (10.0.0.10) serves cluster-wide API data for all 5 nodes
---
apiVersion: v1
kind: Service
metadata:
  name: pve-cluster
  namespace: monitoring
  labels:
    app.kubernetes.io/name: pve-cluster
    app.kubernetes.io/component: monitoring
spec:
  clusterIP: None  # headless — DNS resolves directly to endpoint IPs
  ports:
    - name: https
      port: 8006
      protocol: TCP
      targetPort: 8006
---
apiVersion: v1
kind: Endpoints
metadata:
  name: pve-cluster
  namespace: monitoring
subsets:
  - addresses:
      - ip: 10.0.0.10  # node-02 — primary PVE API node
    ports:
      - name: https
        port: 8006
        protocol: TCP
