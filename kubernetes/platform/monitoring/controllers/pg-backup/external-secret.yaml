# ExternalSecret — PostgreSQL backup credentials
#
# 1Password item: "pg-backup" in Homelab vault
# Fields:
#   - pg-host: 10.0.0.44
#   - pg-user: postgres (superuser for pg_dumpall)
#   - pg-password: the postgres superuser password
#
# Create the 1Password item:
#   op item create --vault Homelab --category login \
#     --title "pg-backup" \
#     'pg-host=10.0.0.44' \
#     'pg-user=postgres' \
#     'pg-password=<your-postgres-password>'
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pg-backup-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: pg-backup-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # .pgpass format: hostname:port:database:username:password
        pgpass: "{{ .pg_host }}:5432:*:{{ .pg_user }}:{{ .pg_password }}"
        pg-host: "{{ .pg_host }}"
        pg-user: "{{ .pg_user }}"
  data:
    - secretKey: pg_host
      remoteRef:
        key: pg-backup
        property: pg-host
    - secretKey: pg_user
      remoteRef:
        key: pg-backup
        property: pg-user
    - secretKey: pg_password
      remoteRef:
        key: pg-backup
        property: pg-password
