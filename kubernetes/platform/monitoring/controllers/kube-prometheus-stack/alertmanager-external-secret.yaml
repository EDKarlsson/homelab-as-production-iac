# ExternalSecret — syncs Slack webhook URL for Alertmanager
#
# 1Password item: "alertmanager-slack" in Homelab vault
# Field: webhook-url (the full Slack incoming webhook URL)
#
# Create the 1Password item:
#   1. Create a Slack incoming webhook at https://api.slack.com/messaging/webhooks
#   2. op item create --vault Homelab --category login \
#        --title "alertmanager-slack" \
#        'webhook-url=https://hooks.slack.com/services/T.../B.../xxx'
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-slack
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: alertmanager-slack
    creationPolicy: Owner
  data:
    - secretKey: webhook-url
      remoteRef:
        key: alertmanager-slack
        property: webhook-url
