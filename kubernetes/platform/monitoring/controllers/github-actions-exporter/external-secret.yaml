# ExternalSecret — syncs GitHub PAT for the Actions exporter
#
# 1Password item: "github-actions-exporter" in Homelab vault
# Field: token (GitHub PAT with repo scope)
#
# Create the 1Password item:
#   env -u OP_CONNECT_HOST -u OP_CONNECT_TOKEN \
#     op item create --vault Homelab --category login \
#       --title "github-actions-exporter" \
#       'token=ghp_...'
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-actions-exporter
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: github-actions-exporter
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: github-actions-exporter
        property: token
