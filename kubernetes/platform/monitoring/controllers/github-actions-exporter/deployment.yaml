# GitHub Actions Exporter — polls GitHub REST API for workflow/runner metrics
#
# Prerequisites:
#   1. Create a GitHub PAT (classic) with scope: repo
#   2. Create 1Password item "github-actions-exporter" in Homelab vault:
#        env -u OP_CONNECT_HOST -u OP_CONNECT_TOKEN \
#          op item create --vault Homelab --category login \
#            --title "github-actions-exporter" \
#            'token=ghp_...'
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-actions-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: github-actions-exporter
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: github-actions-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: github-actions-exporter
        app.kubernetes.io/component: monitoring
    spec:
      containers:
        - name: github-actions-exporter
          image: ghcr.io/labbs/github-actions-exporter:1.9.0
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-actions-exporter
                  key: token
            - name: GITHUB_REPOS
              value: "homelab-admin/homelab-iac"
            - name: GITHUB_REFRESH
              value: "300"
            - name: PORT
              value: "9999"
          ports:
            - name: metrics
              containerPort: 9999
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
