---
apiVersion: v1
kind: Namespace
metadata:
  name: nfs-provisioner
  labels:
    toolkit.fluxcd.io/tenant: sre-team
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nfs-subdir-external-provisioner
  namespace: nfs-provisioner
spec:
  interval: 24h
  url: http://nexus-nexus-repository-manager.nexus.svc.cluster.local:8081/repository/helm-nfs-provisioner/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-subdir-external-provisioner
  namespace: nfs-provisioner
spec:
  interval: 30m
  install:
    remediation:
      retries: 3
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: "4.x"
      sourceRef:
        kind: HelmRepository
        name: nfs-subdir-external-provisioner
        namespace: nfs-provisioner
      interval: 12h
  values:
    nfs:
      server: 10.0.0.161
      path: /volume1/kubernetes
    storageClass:
      name: nfs-kubernetes
      defaultClass: false
      reclaimPolicy: Retain
      archiveOnDelete: true
