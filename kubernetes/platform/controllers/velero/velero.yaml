---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: vmware-tanzu
  namespace: velero
spec:
  interval: 24h
  url: http://nexus-nexus-repository-manager.nexus.svc.cluster.local:8081/repository/helm-vmware-tanzu/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 1h
  dependsOn:
    - name: minio
  install:
    remediation:
      retries: 3
    crds: Create
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: velero
      version: "11.x"
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: velero
      interval: 12h
  values:
    image:
      repository: velero/velero
      tag: v1.17.2

    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.13.2
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins

    configuration:
      features: EnableCSI

      backupStorageLocation:
        - name: default
          provider: aws
          bucket: velero-backups
          default: true
          credential:
            name: velero-s3-credentials
            key: cloud
          config:
            region: minio
            s3ForcePathStyle: "true"
            s3Url: http://minio.velero.svc.cluster.local:9000

      # CSI snapshots use VolumeSnapshotClass (discovered via label), not VSL
      volumeSnapshotLocation: []

    credentials:
      useSecret: false
      existingSecret: velero-s3-credentials

    deployNodeAgent: true
    nodeAgent:
      podVolumePath: /var/lib/kubelet/pods
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi

    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        memory: 512Mi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          app.kubernetes.io/component: monitoring

    # --- Backup Schedules ---
    # Daily: all namespaces, CSI snapshots with data movement to MinIO/NAS
    # Weekly: same scope, longer retention for monthly recovery points
    schedules:
      daily-backup:
        disabled: false
        schedule: "0 12 * * *"
        useOwnerReferencesInBackup: false
        template:
          ttl: "168h"
          includedNamespaces:
            - "*"
          snapshotMoveData: true
          storageLocation: default
          defaultVolumesToFsBackup: false
      weekly-backup:
        disabled: false
        schedule: "0 13 * * 0"
        useOwnerReferencesInBackup: false
        template:
          ttl: "720h"
          includedNamespaces:
            - "*"
          snapshotMoveData: true
          storageLocation: default
          defaultVolumesToFsBackup: false
