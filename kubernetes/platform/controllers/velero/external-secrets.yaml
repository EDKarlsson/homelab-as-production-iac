---
# MinIO root credentials — used by MinIO itself
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: rootUser
      remoteRef:
        key: velero-minio
        property: rootUser
    - secretKey: rootPassword
      remoteRef:
        key: velero-minio
        property: rootPassword
---
# Velero S3 credentials — AWS credential file format for velero-plugin-for-aws
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-s3-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: velero-s3-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .rootUser }}
          aws_secret_access_key={{ .rootPassword }}
  data:
    - secretKey: rootUser
      remoteRef:
        key: velero-minio
        property: rootUser
    - secretKey: rootPassword
      remoteRef:
        key: velero-minio
        property: rootPassword
---
# Kopia repository encryption password — IMMUTABLE after first backup
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-repo-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: velero-repo-credentials
    creationPolicy: Owner
  data:
    - secretKey: repository-password
      remoteRef:
        key: velero-minio
        property: repoPassword
