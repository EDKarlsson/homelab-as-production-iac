---
apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
  labels:
    toolkit.fluxcd.io/tenant: sre-team
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: codecentric
  namespace: keycloak
spec:
  interval: 24h
  url: http://nexus-nexus-repository-manager.nexus.svc.cluster.local:8081/repository/helm-codecentric/
---
# Prerequisites before this HelmRelease will reconcile:
#   1. Keycloak admin credentials in 1Password:
#      op item create --vault Homelab --category login \
#        --title "keycloak-admin" username=admin \
#        --generate-password='20,letters,digits,symbols'
#   2. Keycloak DB credentials in 1Password:
#      op item create --vault Homelab --category login \
#        --title "keycloak-db" username=keycloak \
#        --generate-password='20,letters,digits'
#   3. PostgreSQL database provisioned on 10.0.0.44 (VIP):
#      sudo -u postgres createdb keycloak
#      (see keycloak-external-secret.yaml for full SQL)
#
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    force: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: keycloakx
      version: "7.x"
      sourceRef:
        kind: HelmRepository
        name: codecentric
        namespace: keycloak
      interval: 12h
  values:
    command:
      - "/opt/keycloak/bin/kc.sh"
      - "start"
      - "--hostname-strict=false"
      - "--http-enabled=true"
    extraEnv: |
      - name: KEYCLOAK_ADMIN
        value: admin
      - name: KEYCLOAK_ADMIN_PASSWORD
        valueFrom:
          secretKeyRef:
            name: keycloak-admin
            key: admin-password
      - name: KC_DB
        value: postgres
      - name: KC_DB_URL_HOST
        value: "10.0.0.44"
      - name: KC_DB_URL_PORT
        value: "5432"
      - name: KC_DB_URL_DATABASE
        value: keycloak
      - name: KC_DB_USERNAME
        value: keycloak
      - name: KC_DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: keycloak-db
            key: password
      - name: KC_PROXY_HEADERS
        value: xforwarded
      # Tailscale URL is the canonical frontend hostname for Keycloak.
      # Tokens are issued with iss: https://keycloak.homelab.ts.net/...
      # and the OIDC authorization endpoint redirects users to the Tailscale
      # URL (publicly trusted LE cert). The nip.io ingress below remains for
      # in-cluster pod routing (resolved via CoreDNS coredns-custom override).
      - name: KC_HOSTNAME_URL
        value: "https://keycloak.homelab.ts.net"
      - name: KC_HOSTNAME_ADMIN_URL
        value: "https://keycloak.10.0.0.201.nip.io"
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: homelab-ca-issuer
      rules:
        - host: keycloak.10.0.0.201.nip.io
          paths:
            - path: /
              pathType: Prefix
        # In-cluster routing for pods that resolve keycloak.homelab.ts.net
        # via the coredns-custom override (→ 10.0.0.201). External browsers
        # reach Keycloak via the Tailscale operator ingress (keycloak-tailscale-ingress.yaml)
        # which serves a real LE cert — this entry is pod-only.
        - host: keycloak.homelab.ts.net
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: keycloak-tls
          hosts:
            - keycloak.10.0.0.201.nip.io
            - keycloak.homelab.ts.net
