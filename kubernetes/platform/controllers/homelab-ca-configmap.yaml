# Homelab self-signed CA certificate — public, not sensitive.
# Used by in-cluster services (OAuth2 Proxy, etc.) that need to trust
# the homelab CA for TLS connections to *.10.0.0.201.nip.io ingresses.
#
# The cert is managed by cert-manager (secret: cert-manager/homelab-ca).
# This ConfigMap is a read-only copy for pod consumption; it does not
# need to be rotated unless the CA itself is regenerated.
